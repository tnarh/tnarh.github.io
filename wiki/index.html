<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FahhhWiki Editor</title>
    
    <link href="style.css" rel="stylesheet">
</head>
<body>
    
    <div id="nav">
        <button class="btn1" onmousedown="cmd('export')">
            Export
        </button>
        <button class="btn1" onmousedown="cmd('delete'); return false;">
            Delete Selected
        </button>
        <button class="btn1" onmousedown="cmd('moveup'); return false;">
            Move Up
        </button>
        <button class="btn1" onmousedown="cmd('movedown'); return false;">
            Move Down
        </button>
        
        <br><br>
        
        <button class="btn1" onclick="add('p')">Add Paragraph</button>
        <button class="btn1" onclick="add('infobox')">Add Infobox</button>
        <button class="btn1" onclick="add('h1')">Add Heading1</button>
        <button class="btn1" onclick="add('h2')">Add Heading2</button>
        <button class="btn1" onclick="add('h3')">Add Heading3</button>
        <button class="btn1" onclick="add('image')">Add Image</button>
        <button class="btn1" onclick="add('quote')">Add Quote</button>
        
        <br>
        
        <button class="btn1" onclick="turn('bold')">Toggle <b>Bold</b></button>
        <button class="btn1" onclick="turn('italic')">Toggle <i>Italic</i></button>
        <!-- <button class="btn1" onclick="turn('link')">Toggle <span class="mono">Link</span></button> -->
    </div>

    <br>
    
    <div id="article"></div>
    
    <script src="script.js"></script>
    
</body>
</html>
